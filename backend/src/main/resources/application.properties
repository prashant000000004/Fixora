# FixNow Backend Configuration
# Server
server.port=8080
server.address=0.0.0.0

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/fixnow
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=fixnow-super-secret-key-that-should-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# CORS — allow all origins for development
app.cors.allowed-origins=*

# Logging
logging.level.com.fixnow=DEBUG
